<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eternime — Sin conexión</title>
<style>
  body { margin: 0; min-height: 100svh; display: flex; align-items: center; justify-content: center;
    background: #0a0a0f; color: #f5f2ea; font-family: ui-sans-serif, system-ui, sans-serif; text-align: center; }
  .ring { width: 88px; height: 88px; border-radius: 50%; border: 1px solid rgba(212,175,106,.4);
    box-shadow: 0 0 42px rgba(232,200,126,.3), inset 0 0 28px rgba(212,175,106,.08);
    margin: 0 auto 1.6rem; animation: breathe 4.5s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity:.8 } 50% { transform: scale(1.06); opacity:1 } }
  h1 { font-family: Georgia, serif; font-weight: 400; font-size: 1.4rem; margin: 0 0 .5rem; }
  p { color: rgba(245,242,234,.55); font-size: .92rem; max-width: 22rem; margin: 0 auto; }
</style>
</head>
<body>
  <div>
    <div class="ring"></div>
    <h1>Tu legado te espera</h1>
    <p>Parece que no hay conexión en este momento. Eternime volverá a estar contigo en cuanto regreses a la red.</p>
  </div>
</body>
</html>
